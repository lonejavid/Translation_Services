<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starting…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
    }

    .card {
      background: rgba(20, 20, 30, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 48px;
      width: 420px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      -webkit-app-region: no-drag;
    }

    .logo {
      font-size: 36px;
      margin-bottom: 12px;
    }

    h1 {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      margin-bottom: 32px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      min-height: 18px;
      transition: opacity 0.2s;
    }

    .error-box {
      display: none;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 10px;
      padding: 16px;
      margin-top: 20px;
      color: #fca5a5;
      font-size: 13px;
      line-height: 1.5;
      text-align: left;
    }

    .quit-btn {
      display: none;
      margin-top: 16px;
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .quit-btn:hover { background: rgba(239,68,68,0.35); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎬</div>
    <h1>Video Translator</h1>
    <p class="subtitle">AI-powered dubbing for Mac</p>

    <div class="spinner" id="spinner"></div>
    <div id="status">Initialising…</div>

    <div class="error-box" id="errorBox"></div>
    <button class="quit-btn" id="quitBtn" onclick="window.electronAPI.quitApp()">Quit</button>
  </div>

  <script>
    window.electronAPI.onStatus((msg) => {
      document.getElementById("status").textContent = msg;
    });

    window.electronAPI.onError((msg) => {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("status").style.display = "none";
      const box = document.getElementById("errorBox");
      box.style.display = "block";
      box.textContent = msg;
      document.getElementById("quitBtn").style.display = "inline-block";
    });
  </script>
</body>
</html>
